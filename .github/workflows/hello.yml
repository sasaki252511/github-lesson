name: Literals
on: push
jobs:
  print:
    runs-on: windows-latest
    steps:
      - run: printenv | grep 'LITERAL_'
        env:
          Literal_NULL: ${{ null }}
          LITERAL_BOOLEAN: ${{ true }}
          LITERAL_NUMBER: ${{ 1234 }}
          LITERAL_STRING: ${{ 'HELLO' }}
          LITERAL_OMIT_STRING: World
