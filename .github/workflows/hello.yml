name: Comment
run-name: Run by @${{github.actor}}
on: pull_request
jobs:
  comment:
    runs-on: windows-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - run: gh pr comment ${{ github.event.pull_request.number }} --body "Hello, $env:GITHUB_ACTOR"
        env:
          GITHUB_TOKEN: "${{secrets.GITHUB_TOKEN}}"
